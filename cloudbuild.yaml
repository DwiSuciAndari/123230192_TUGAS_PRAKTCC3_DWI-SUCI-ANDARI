steps:
  # 1. Membuat image dari Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/tcc-be-rest-(3 nim terakhir kalian)", "."]

  # 2. Meng-upload/push image ke Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/tcc-be-rest-(3 nim terakhir kalian)"]

  # 3. Melakukan deploy ke Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "be-rest",
        "--image",
        "gcr.io/$PROJECT_ID/tcc-be-rest-(3 nim terakhir kalian)",
        "--timeout",
        "1000s",
        "--port",
        "3000",
        "--region",
        "us-central1",
        "--allow-unauthenticated",
      ]

options:
  logging: CLOUD_LOGGING_ONLY
