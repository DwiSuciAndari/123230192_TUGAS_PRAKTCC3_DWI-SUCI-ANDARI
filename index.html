<!DOCTYPE html>
<html>
<head>
  <title>❤️Notes 192❤️</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, pink, lightblue, silver);
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #797272;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .tambah {
      background: linear-gradient(45deg, lightblue, purple);
    }

    .hapus {
      background: rgb(206, 132, 206);
    }

    .edit {
      background: rgb(74, 74, 170);
      margin-bottom: 5px;
    }

    .card {
      background: #f5f5f5;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border-left: 5px solid rgb(110, 110, 150);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>💙 Ices Notes 192 ❤️</h1>

    <input id="judul" placeholder="Judul">
    <input id="isi" placeholder="Isi">
    <button class="tambah" onclick="tambah()">Tambah</button>

    <h3>Daftar Catatan</h3>
    <div id="list"></div>
  </div>

  <script>
    let editId = null;

    function getNotes() {
      fetch("/notes")
        .then(res => res.json())
        .then(data => {
          let html = "";
          data.forEach(n => {
            html += `
              <div class="card">
                <b>${n.judul}</b><br>
                ${n.isi}<br>
                <small>${n.tanggal_dibuat}</small><br>

                <button class="edit" onclick="edit(${n.id}, '${n.judul}', '${n.isi}')">Edit</button>
                <button class="hapus" onclick="hapus(${n.id})">Hapus</button>
              </div>
            `;
          });
          document.getElementById("list").innerHTML = html;
        });
    }

    function tambah() {
      const judul = document.getElementById("judul").value;
      const isi = document.getElementById("isi").value;

      if (editId) {
        fetch("/notes/" + editId, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ judul, isi })
        }).then(() => {
          editId = null;
          getNotes();
        });
      } else {
        fetch("/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ judul, isi })
        }).then(() => getNotes());
      }

      document.getElementById("judul").value = "";
      document.getElementById("isi").value = "";
    }

    function hapus(id) {
      fetch("/notes/" + id, { method: "DELETE" })
        .then(() => getNotes());
    }

    function edit(id, judul, isi) {
      document.getElementById("judul").value = judul;
      document.getElementById("isi").value = isi;
      editId = id;
    }

    getNotes();
  </script>
</body>
</html>
